<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressure Monitor</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="container">
    <h1 id="location-header">
      <span id="location-name">Body Weather<br><span id="location-city">Berlin</span></span>
      <span class="location-edit-icon" id="location-edit-btn" title="Change location">&#9998;</span>
    </h1>
    <div id="location-search" class="location-search hidden">
      <input type="text" id="location-input" placeholder="Search city..." autocomplete="off">
      <ul id="location-results"></ul>
    </div>

    <div class="comfort-card" id="comfort-card">
      <div class="bw-summary">
        <div class="bw-level" id="bw-level">--</div>
        <div class="bw-label" id="bw-label">Loading...</div>
        <div class="bw-reason" id="bw-reason"></div>
      </div>
      <div class="bw-detail" id="bw-bars"></div>
    </div>

    <div class="readings-row">
      <span class="reading pressure"><span id="current">--</span> hPa</span>
      <span class="reading-sep">&middot;</span>
      <span class="reading humidity"><span id="current-humidity">--</span></span>
      <span class="reading-sep">&middot;</span>
      <span class="reading temperature"><span id="current-temp">--</span></span>
    </div>

    <h2>What To Do</h2>
    <div id="action-cards"></div>

    <h2>Forecast</h2>
    <div class="range-buttons" id="forecast-buttons">
      <button data-hours="24" class="active">1D</button>
      <button data-hours="72">3D</button>
      <button data-hours="168">1W</button>
      <button data-hours="336">2W</button>
    </div>
    <canvas id="forecast-chart"></canvas>

    <h2>History</h2>
    <div class="range-buttons" id="range-buttons">
      <button data-range="1w" class="active">1W</button>
      <button data-range="1m">1M</button>
      <button data-range="3m">3M</button>
      <button data-range="6m">6M</button>
      <button data-range="1y">1Y</button>
    </div>
    <canvas id="chart"></canvas>
  </div>

  <script src="app.js"></script>
</body>
</html>
